basePath: /api
definitions:
  ttgo_pkg_tracker_models.AcceptImportRequest:
    properties:
      folder_id:
        description: 'Required: target folder'
        type: string
      requirement_id:
        description: 'Optional: link to requirement'
        type: string
      tests:
        description: Selected & edited test cases
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.GeneratedTestCase'
        type: array
    type: object
  ttgo_pkg_tracker_models.AcceptImportResponse:
    properties:
      count:
        type: integer
      created_ids:
        items:
          type: string
        type: array
      linked_to:
        description: Requirement ID if linked
        type: string
    type: object
  ttgo_pkg_tracker_models.Backup:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      creator_id:
        description: user ID (NULL for automatic)
        type: string
      creator_name:
        description: denormalized display name
        type: string
      error_message:
        description: error details if failed
        type: string
      file_path:
        description: relative path to backup file
        type: string
      file_size:
        description: bytes, populated on completion
        type: integer
      id:
        type: string
      signature:
        description: HMAC over the file bytes (F-017)
        type: string
      status:
        description: '"in_progress", "completed", or "failed"'
        type: string
      type:
        description: '"manual", "automatic", or "pre-restore"'
        type: string
    type: object
  ttgo_pkg_tracker_models.BackupSchedule:
    properties:
      enabled:
        type: boolean
      id:
        description: fixed "default"
        type: string
      interval_hours:
        type: integer
      last_run_at:
        type: string
      next_run_at:
        type: string
      retention_count:
        type: integer
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.Category:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      test_cases:
        description: Associations
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.TestCase'
        type: array
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.CreateCustomFieldRequest:
    properties:
      is_mandatory:
        type: boolean
      name:
        type: string
      options:
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/ttgo_pkg_tracker_models.CustomFieldType'
    type: object
  ttgo_pkg_tracker_models.CustomFieldDefinition:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_mandatory:
        type: boolean
      name:
        type: string
      options:
        description: Array of strings for SELECT type
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/ttgo_pkg_tracker_models.CustomFieldType'
    type: object
  ttgo_pkg_tracker_models.CustomFieldType:
    enum:
    - TEXT
    - SELECT
    - NUMBER
    - DATE
    - CHECKBOX
    type: string
    x-enum-varnames:
    - FieldTypeText
    - FieldTypeSelect
    - FieldTypeNumber
    - FieldTypeDate
    - FieldTypeCheckbox
  ttgo_pkg_tracker_models.CustomFieldValue:
    properties:
      custom_field_id:
        type: string
      definition:
        $ref: '#/definitions/ttgo_pkg_tracker_models.CustomFieldDefinition'
      id:
        type: string
      test_case_id:
        type: string
      value:
        description: Stored as JSON to handle basic types
        items:
          type: integer
        type: array
    type: object
  ttgo_pkg_tracker_models.ExecutionStatus:
    enum:
    - PASS
    - FAIL
    - SKIP
    - PENDING
    - RUNNING
    - ERROR
    type: string
    x-enum-varnames:
    - StatusPass
    - StatusFail
    - StatusSkip
    - StatusPending
    - StatusRunning
    - StatusError
  ttgo_pkg_tracker_models.Folder:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_id:
        description: Nullable for root folders
        type: string
      sub_folders:
        description: Children fields for API responses (not stored in DB directly)
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.Folder'
        type: array
      test_cases:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.TestCase'
        type: array
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.GeneratedStep:
    properties:
      action:
        type: string
      expected_result:
        type: string
    type: object
  ttgo_pkg_tracker_models.GeneratedTestCase:
    properties:
      category:
        type: string
      description:
        type: string
      name:
        type: string
      steps:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.GeneratedStep'
        type: array
      temp_id:
        type: string
    type: object
  ttgo_pkg_tracker_models.JiraConfigResponse:
    properties:
      api_token_masked:
        type: string
      base_url:
        type: string
      created_at:
        type: string
      default_issue_type:
        type: string
      default_project_key:
        type: string
      email:
        type: string
      enabled:
        type: boolean
      id:
        type: string
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.JiraTicketResult:
    properties:
      already_imported:
        type: boolean
      description:
        type: string
      error:
        type: string
      existing_requirement_id:
        type: string
      identifier:
        type: string
      key:
        type: string
      status:
        type: string
      success:
        type: boolean
      title:
        type: string
      url:
        type: string
    type: object
  ttgo_pkg_tracker_models.ParseImportRequest:
    properties:
      content:
        description: Raw pasted text or file content
        type: string
      folder_id:
        description: 'Optional: target folder for duplicate name detection'
        type: string
      format_hint:
        description: 'Optional: "json", "csv", "markdown_table", "numbered_list",
          "" (auto-detect)'
        type: string
    type: object
  ttgo_pkg_tracker_models.ParseImportResponse:
    properties:
      debug:
        additionalProperties: true
        description: LLM feedback (only when format is "ai")
        type: object
      detected_format:
        description: '"json", "csv", "markdown_table", "numbered_list", "ai"'
        type: string
      duplicate_names:
        description: Names matching existing TCs in target folder
        items:
          type: string
        type: array
      test_cases:
        description: Parsed test cases (reuses existing DTO)
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.GeneratedTestCase'
        type: array
      total_found:
        description: Total items found before 50-cap
        type: integer
      truncated:
        description: True if total_found > 50
        type: boolean
      unparseable:
        description: Items that couldn't be parsed
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.UnparseableItem'
        type: array
    type: object
  ttgo_pkg_tracker_models.QTestBulkResult:
    properties:
      failed:
        type: integer
      items:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.QTestBulkResultItem'
        type: array
      rate_limited:
        type: boolean
      skipped:
        type: integer
      succeeded:
        type: integer
      total:
        type: integer
    type: object
  ttgo_pkg_tracker_models.QTestBulkResultItem:
    properties:
      error:
        type: string
      qtest_test_case_id:
        type: integer
      qtest_url:
        type: string
      status:
        description: success, failed, skipped, rate_limited
        type: string
      test_case_id:
        type: string
      test_case_name:
        type: string
    type: object
  ttgo_pkg_tracker_models.QTestProperty:
    properties:
      field_type:
        type: string
      name:
        type: string
      type:
        type: string
      value:
        items:
          type: integer
        type: array
      value_text:
        type: string
    type: object
  ttgo_pkg_tracker_models.QTestRemoteStep:
    properties:
      description:
        type: string
      expected:
        type: string
    type: object
  ttgo_pkg_tracker_models.QTestRemoteTestCase:
    properties:
      description:
        type: string
      id:
        type: integer
      module_id:
        type: integer
      module_path:
        type: string
      name:
        type: string
      parent_id:
        type: integer
      pid:
        type: string
      properties:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.QTestProperty'
        type: array
      steps:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.QTestRemoteStep'
        type: array
    type: object
  ttgo_pkg_tracker_models.Requirement:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      identifier:
        description: e.g. "PROJ-123"
        type: string
      imported_at:
        description: Timestamp of last import/sync
        type: string
      parent_id:
        type: string
      source_key:
        description: Jira ticket key or Confluence page ID
        type: string
      source_type:
        description: '"" (manual), "jira", or "confluence"'
        type: string
      source_url:
        description: Full URL to source
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.RequirementTestCaseLink:
    properties:
      created_at:
        type: string
      id:
        type: string
      requirement_id:
        type: string
      test_case_id:
        type: string
    type: object
  ttgo_pkg_tracker_models.RunFolder:
    properties:
      created_at:
        type: string
      display_order:
        type: integer
      id:
        type: string
      name:
        type: string
      parent_id:
        description: Nullable for root folders
        type: string
      sub_folders:
        description: Children fields for API responses (not stored in DB directly)
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.RunFolder'
        type: array
      test_runs:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.TestRun'
        type: array
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.RunResult:
    properties:
      app_version:
        type: string
      attempt_number:
        type: integer
      browser:
        description: Context
        type: string
      closed_defect_link_count:
        type: integer
      created_at:
        description: Timestamps
        type: string
      defect_type:
        description: |-
          DefectType classifies the failure reason for FAIL results.
          Values: "to_investigate" | "product_bug" | "automation_bug" | "system_issue" | "" (not applicable)
        type: string
      duration_ms:
        description: Timing
        type: integer
      end_time:
        type: string
      environment:
        type: string
      error_message:
        description: Failure Details
        type: string
      failure_type:
        type: string
      id:
        type: string
      log_text:
        type: string
      metadata:
        items:
          type: integer
        type: array
      open_defect_link_count:
        description: Defect link counts (not persisted, populated by GetTestRun)
        type: integer
      os:
        type: string
      screenshots:
        description: Artifacts
        type: string
      stack_trace:
        type: string
      start_time:
        type: string
      status:
        $ref: '#/definitions/ttgo_pkg_tracker_models.ExecutionStatus'
      steps:
        description: Detailed Steps & Metadata
        items:
          type: integer
        type: array
      test_case:
        allOf:
        - $ref: '#/definitions/ttgo_pkg_tracker_models.TestCase'
        description: Association (not stored, loaded via preload)
      test_case_id:
        description: Nullable if test case is deleted
        type: string
      test_name_snapshot:
        description: Preserved name
        type: string
      test_run_id:
        type: string
      trace_url:
        type: string
      updated_at:
        type: string
      video:
        type: string
    type: object
  ttgo_pkg_tracker_models.TestCase:
    properties:
      categories:
        description: Associations
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.Category'
        type: array
      closed_defect_count:
        type: integer
      created_at:
        type: string
      custom_values:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.CustomFieldValue'
        type: array
      description:
        type: string
      folder_id:
        type: string
      id:
        type: string
      linked_requirements:
        description: Populated on demand by store.ListRequirementsByTestCase — not
          persisted.
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.Requirement'
        type: array
      name:
        type: string
      open_defect_count:
        description: '008-jira-integration: populated on demand by GetFolderTree —
          not persisted.'
        type: integer
      reverification_flagged:
        description: |-
          008-jira-integration: set true when all linked defects reach statusCategory=="done".
          Persists until manually dismissed via DELETE /api/tests/{id}/reverification-flag.
        type: boolean
      steps:
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.TestStep'
        type: array
      steps_count:
        description: |-
          Populated on demand by ListTestCases when called with TestCaseFilter.ListView=true.
          Not persisted — avoids the cost of Preload("Steps") when the caller only needs the count.
        type: integer
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.TestRun:
    properties:
      automation_bug_count:
        type: integer
      category_id:
        description: nullable — empty runs have no category
        type: string
      closed_defect_link_count:
        type: integer
      comment_count:
        description: Comment count (not persisted, populated by list handler)
        type: integer
      created_at:
        type: string
      failed_results:
        type: integer
      id:
        type: string
      name:
        type: string
      open_defect_link_count:
        description: Defect link counts (not persisted, populated by list handler)
        type: integer
      passed_results:
        type: integer
      pending_results:
        type: integer
      product_bug_count:
        type: integer
      retried_count:
        description: Retry stats (not persisted, populated by GetTestRun/GetTestRuns)
        type: integer
      run_folder_id:
        description: nullable FK to RunFolder
        type: string
      run_results:
        description: Associations
        items:
          $ref: '#/definitions/ttgo_pkg_tracker_models.RunResult'
        type: array
      skipped_results:
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/ttgo_pkg_tracker_models.ExecutionStatus'
        description: PENDING, RUNNING, PASSED, FAILED, etc.
      system_issue_count:
        type: integer
      to_investigate_count:
        description: Defect type breakdowns (not persisted, populated by GetTestRuns
          list query)
        type: integer
      total_attempts:
        type: integer
      total_results:
        description: Computed aggregate fields (not persisted, populated by GetTestRuns
          list query)
        type: integer
      updated_at:
        type: string
    type: object
  ttgo_pkg_tracker_models.TestStep:
    properties:
      action:
        type: string
      expected_result:
        type: string
      id:
        type: string
      order_index:
        type: integer
      test_case_id:
        type: string
    type: object
  ttgo_pkg_tracker_models.UnparseableItem:
    properties:
      line_number:
        description: Approximate line in the original content
        type: integer
      raw_text:
        description: Original text that couldn't be parsed
        type: string
      reason:
        description: Why parsing failed
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Test tracking and run management REST API.
  title: TTGO API
  version: "1.0"
paths:
  /admin/reset:
    delete:
      consumes:
      - application/json
      description: 'Erase ALL application data (test cases, runs, folders, etc.) while
        preserving user accounts. Requires confirmation body {"confirm": "CONFIRM
        RESET"}. Admin only.'
      parameters:
      - description: Confirmation payload
        in: body
        name: body
        required: true
        schema:
          properties:
            confirm:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reset all data
      tags:
      - admin
  /analytics/flaky:
    get:
      description: Returns tests ranked by status-switch percentage
      parameters:
      - default: 30
        description: Number of recent runs to analyze per test
        in: query
        name: lookback
        type: integer
      - default: 20
        description: Max results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Detect flaky tests (switch method)
      tags:
      - analytics
  /analytics/summary:
    get:
      description: Returns an aggregated summary of test run analytics
      produces:
      - application/json
      responses:
        "200":
          description: Analytics summary object
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get analytics summary
      tags:
      - analytics
  /analytics/trend:
    get:
      description: Returns time-series trend data for test runs over a given number
        of days
      parameters:
      - default: 30
        description: Number of days to include in the trend
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Trend points array and days count
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get trend data
      tags:
      - analytics
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the currently authenticated user's password. Requires session
        cookie.
      parameters:
      - description: Passwords
        in: body
        name: body
        required: true
        schema:
          properties:
            current_password:
              type: string
            new_password:
              type: string
          type: object
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            properties:
              error:
                type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - SessionCookie: []
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password; sets a session_token cookie
        on success.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              user:
                type: object
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidate the current session and clear the session cookie.
      responses:
        "204":
          description: No Content
      security:
      - SessionCookie: []
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the currently authenticated user from the session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              user:
                type: object
            type: object
        "401":
          description: Unauthorized
          schema:
            properties:
              error:
                type: string
            type: object
      security:
      - SessionCookie: []
      summary: Current user
      tags:
      - auth
  /backup-schedule:
    get:
      description: Return the current automatic backup schedule configuration.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ttgo_pkg_tracker_models.BackupSchedule'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get backup schedule
      tags:
      - backups
    put:
      consumes:
      - application/json
      description: Update the automatic backup schedule (enabled, interval, retention
        count).
      parameters:
      - description: Schedule settings
        in: body
        name: body
        required: true
        schema:
          properties:
            enabled:
              type: boolean
            interval_hours:
              type: integer
            retention_count:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ttgo_pkg_tracker_models.BackupSchedule'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update backup schedule
      tags:
      - backups
  /backups:
    get:
      description: Return all backup records ordered by creation date descending.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ttgo_pkg_tracker_models.Backup'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - backups
    post:
      description: Initiate a manual on-demand database backup. Only one backup/restore
        operation may run at a time.
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/ttgo_pkg_tracker_models.Backup'
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create backup
      tags:
      - backups
  /backups/{id}:
    delete:
      description: Delete a backup record and remove its file from disk.
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete backup
      tags:
      - backups
    get:
      description: Return metadata for a single backup by ID.
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ttgo_pkg_tracker_models.Backup'
        "404":
          description: Not Found
          schema:
