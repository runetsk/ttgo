  /webhooks/{id}:
    delete:
      description: Delete an existing webhook configuration by ID
      parameters:
      - description: Webhook ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a webhook
      tags:
      - webhooks
  /webhooks/{id}/logs:
    get:
      description: Return paginated dispatch logs for a webhook
      parameters:
      - description: Webhook ID
        in: path
        name: id
        required: true
        type: string
      - default: 50
        description: Maximum number of logs to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of logs to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: logs array and total count
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get webhook dispatch logs
      tags:
      - webhooks
  /ws:
    get:
      description: Upgrade to a WebSocket connection for real-time event streaming.
        Authenticates via session_token cookie. Sends JSON-encoded events for entity
        changes (test cases, runs, backups, etc.).
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: WebSocket connection
      tags:
      - websocket
securityDefinitions:
  BearerAuth:
    description: 'Enter: "Bearer <your-token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
